name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write
  contents: read

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Triage Issue
        uses: actions/github-script@v7
        with:
          script: |
            // Get issue details
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = issue.body ? issue.body.toLowerCase() : '';
            const repo = context.repo;

            // Required labels definition
            const requiredLabels = [
              // Category Labels
              { name: 'bug', description: 'Something isn\'t working', color: 'd73a4a' },
              { name: 'enhancement', description: 'New feature or request', color: 'a2eeef' },
              { name: 'epic', description: 'Large feature requiring multiple sub-tasks', color: '0052cc' },
              { name: 'maintenance', description: 'Maintenance and housekeeping tasks', color: 'fef2c0' },
              // Priority Labels
              { name: 'priority-critical', description: 'Critical priority issue', color: 'b60205' },
              { name: 'priority-high', description: 'High priority issue', color: 'ff9f1c' },
              { name: 'priority-medium', description: 'Medium priority issue', color: 'fbca04' },
              { name: 'priority-low', description: 'Low priority issue', color: '0e8a16' },
              // Status Labels
              { name: 'needs-triage', description: 'Needs to be reviewed by maintainers', color: 'e6e6e6' },
              { name: 'needs-review', description: 'Awaiting review from maintainers', color: '1d76db' },
              { name: 'first-time-contributor', description: 'Issue created by first-time contributor', color: '006b75' }
            ];

            // Create missing labels
            for (const label of requiredLabels) {
              try {
                await github.rest.issues.getLabel({
                  ...repo,
                  name: label.name
                });
              } catch (err) {
                if (err.status === 404) {
                  await github.rest.issues.createLabel({
                    ...repo,
                    name: label.name,
                    description: label.description,
                    color: label.color
                  });
                  console.log(`Created missing label: ${label.name}`);
                } else {
                  console.error(`Error handling label ${label.name}:`, err);
                }
              }
            }

            // Get current issue labels
            const currentLabels = issue.labels.map(l => l.name);

            // Add initial needs-triage label
            if (!currentLabels.includes('needs-triage')) {
              await github.rest.issues.addLabels({
                ...repo,
                issue_number: issue.number,
                labels: ['needs-triage']
              });
              currentLabels.push('needs-triage');
              console.log('Added needs-triage label');
            }

            // Assign category labels based on title
            const categoryAssignments = [];
            if (title.includes('bug')) categoryAssignments.push('bug');
            if (title.includes('epic')) categoryAssignments.push('epic');
            if (title.includes('maintenance')) categoryAssignments.push('maintenance');

            // Add missing category labels
            const missingCategories = categoryAssignments.filter(l => !currentLabels.includes(l));
            if (missingCategories.length > 0) {
              await github.rest.issues.addLabels({
                ...repo,
                issue_number: issue.number,
                labels: missingCategories
              });
              currentLabels.push(...missingCategories);
              console.log(`Added category labels: ${missingCategories.join(', ')}`);
            }

            // Assign priority labels (highest priority first)
            const priorityRules = [
              { label: 'priority-critical', keywords: ['critical', 'urgent', 'production', 'outage'] },
              { label: 'priority-high', keywords: ['important', 'high', 'blocking'] },
              { label: 'priority-medium', keywords: ['medium', 'normal'] },
              { label: 'priority-low', keywords: ['low', 'nice-to-have', 'minor'] }
            ];

            let selectedPriority = 'priority-medium'; // Default
            for (const rule of priorityRules) {
              const hasKeyword = rule.keywords.some(k => title.includes(k) || body.includes(k));
              if (hasKeyword) {
                selectedPriority = rule.label;
                break;
              }
            }

            // Remove existing priority labels
            const existingPriorities = currentLabels.filter(l => l.startsWith('priority-'));
            if (existingPriorities.length > 0) {
              for (const p of existingPriorities) {
                await github.rest.issues.removeLabel({
                  ...repo,
                  issue_number: issue.number,
                  name: p
                });
              }
              currentLabels = currentLabels.filter(l => !l.startsWith('priority-'));
              console.log(`Removed existing priority labels: ${existingPriorities.join(', ')}`);
            }

            // Add selected priority label
            if (!currentLabels.includes(selectedPriority)) {
              await github.rest.issues.addLabels({
                ...repo,
                issue_number: issue.number,
                labels: [selectedPriority]
              });
              currentLabels.push(selectedPriority);
              console.log(`Added priority label: ${selectedPriority}`);
            }

  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: ${{ contains(github.event.issue.labels.*.name, 'epic') }}
    steps:
      - name: Create Epic Subtasks
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const repo = context.repo;
            const parentNumber = issue.number;
            const parentTitle = issue.title;

            // Define subtasks
            const subtasks = [
              { order: 1, name: 'Requirements Analysis' },
              { order: 2, name: 'Design and Architecture' },
              { order: 3, name: 'Implementation' },
              { order: 4, name: 'Testing and Documentation' }
            ];

            // Create subtasks and track their numbers
            const subtaskNumbers = [];
            for (const task of subtasks) {
              try {
                const subtask = await github.rest.issues.create({
                  ...repo,
                  title: `[SUBTASK] ${parentTitle} - Task ${task.order}: ${task.name}`,
                  body: `Related to #${parentNumber}`,
                  labels: ['enhancement', 'needs-review']
                });
                subtaskNumbers.push(subtask.data.number);
                console.log(`Created subtask #${subtask.data.number}: ${task.name}`);
              } catch (err) {
                console.error(`Error creating subtask ${task.name}:`, err);
              }
            }

            // Update parent issue with Epic Tasks checklist
            if (subtaskNumbers.length > 0) {
              const checklist = subtaskNumbers.map(num => `- [ ] #${num}`).join('\n');
              const updatedBody = issue.body ?
                `${issue.body}\n\n## Epic Tasks\n${checklist}` :
                `## Epic Tasks\n${checklist}`;

              await github.rest.issues.update({
                ...repo,
                issue_number: parentNumber,
                body: updatedBody
              });
              console.log('Updated parent issue with Epic Tasks checklist');
            }

  auto-response:
    runs-on: ubuntu-latest
    needs: issue-triage
    steps:
      - name: Handle Auto-Response and Updates
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const author = issue.user.login;
            const repo = context.repo;
            const issueNumber = issue.number;
            const currentLabels = issue.labels.map(l => l.name);

            // 1. Check for first-time contributor
            let isFirstIssue = false;
            try {
              const authorIssues = await github.rest.issues.listForRepo({
                ...repo,
                creator: author,
                state: 'all',
                per_page: 2
              });
              isFirstIssue = authorIssues.data.length === 1;
            } catch (err) {
              console.error('Error checking author issues:', err);
            }

            if (isFirstIssue && !currentLabels.includes('first-time-contributor')) {
              // Add label
              await github.rest.issues.addLabels({
                ...repo,
                issue_number: issueNumber,
                labels: ['first-time-contributor']
              });
              // Post welcome comment
              await github.rest.issues.createComment({
                ...repo,
                issue_number: issueNumber,
                body: `Welcome @${author}! This is your first issue in this repository. We appreciate your contribution and will review this as soon as possible!`
              });
              console.log('Added first-time-contributor label and welcome comment');
            }

            // 2. Post type-specific comment
            let typeComment = '';
            if (currentLabels.includes('bug')) {
              typeComment = 'Thank you for reporting this bug! Please refer to our [Bug Report Guidelines](.github/ISSUE_TEMPLATE/bug_report.md) for any additional details you may need to provide.';
            } else if (currentLabels.includes('epic')) {
              typeComment = 'Thank you for submitting this epic feature request! Please refer to our [Feature Request Process](.github/ISSUE_TEMPLATE/feature_request.md) for more details on how we handle large features.';
            } else if (currentLabels.includes('maintenance')) {
              typeComment = 'Thank you for submitting this maintenance request! Please refer to our [Maintenance Guidelines](.github/ISSUE_TEMPLATE/maintenance_report.md) for more details.';
            }

            if (typeComment) {
              await github.rest.issues.createComment({
                ...repo,
                issue_number: issueNumber,
                body: typeComment
              });
              console.log('Posted type-specific comment');
            }

            // 3. Assign milestone for high/critical priority
            const targetMilestone = 'v1.0.0';
            if (currentLabels.includes('priority-high') || currentLabels.includes('priority-critical')) {
              try {
                // Find or create milestone
                const milestones = await github.rest.issues.listMilestones({
                  ...repo,
                  state: 'open'
                });
                let milestoneId = milestones.data.find(m => m.title === targetMilestone)?.number;

                if (!milestoneId) {
                  const newMilestone = await github.rest.issues.createMilestone({
                    ...repo,
                    title: targetMilestone,
                    state: 'open'
                  });
                  milestoneId = newMilestone.data.number;
                  console.log(`Created milestone ${targetMilestone}`);
                }

                // Assign milestone
                await github.rest.issues.update({
                  ...repo,
                  issue_number: issueNumber,
                  milestone: milestoneId
                });
                console.log(`Assigned milestone ${targetMilestone}`);
              } catch (err) {
                console.error('Error handling milestone:', err);
              }
            }

            // 4. Update status from needs-triage to needs-review
            if (currentLabels.includes('needs-triage')) {
              await github.rest.issues.removeLabel({
                ...repo,
                issue_number: issueNumber,
                name: 'needs-triage'
              });
              await github.rest.issues.addLabels({
                ...repo,
                issue_number: issueNumber,
                labels: ['needs-review']
              });
              console.log('Updated status to needs-review');
            }